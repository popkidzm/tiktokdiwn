<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok DL | Instant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; font-family: sans-serif; }
        .app-container { max-width: 400px; width: 100%; margin: auto; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .btn-gradient { background: linear-gradient(90deg, #fe2c55, #25f4ee); color: black; font-weight: 900; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .loading-pulse { animation: pulse 1.5s infinite; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="app-container">
        <div class="text-center mb-6">
            <h1 class="text-3xl font-black text-white tracking-tighter">TIK<span class="text-[#fe2c55]">TOK</span> SAVER</h1>
        </div>

        <div class="glass p-1.5 rounded-2xl flex items-center mb-4 shadow-xl">
            <input type="text" id="tiktokUrl" placeholder="Paste link..." 
                class="flex-1 bg-transparent p-3 outline-none text-white text-sm placeholder:text-gray-500">
            <button onclick="fetchVideo()" id="fetchBtn" class="btn-gradient px-5 py-3 rounded-xl text-xs uppercase transition active:scale-90">
                Go
            </button>
        </div>

        <div id="loader" class="hidden text-center py-4">
            <div class="text-[10px] text-cyan-400 font-bold uppercase tracking-widest loading-pulse">Fetching Video Data...</div>
        </div>

        <div id="resultCard" class="hidden glass rounded-3xl p-4 animate-in fade-in zoom-in duration-300">
            <div class="flex gap-4 items-center">
                <img id="videoThumb" class="w-20 h-28 object-cover rounded-lg shadow-lg border border-white/10" src="" alt="">
                
                <div class="flex-1 overflow-hidden">
                    <h2 id="videoTitle" class="text-white font-bold text-sm truncate mb-0.5">Title</h2>
                    <p id="authorName" class="text-gray-400 text-[11px] mb-3">@username</p>
                    
                    <div class="flex flex-col gap-2">
                        <button id="downloadMP4" class="w-full bg-[#fe2c55] text-white py-2.5 rounded-lg text-xs font-bold flex items-center justify-center gap-2 hover:opacity-90">
                            <i class="fas fa-download"></i> <span id="dlText">Download Video</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
