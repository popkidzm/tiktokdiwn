<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Video Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-white min-h-screen flex flex-col items-center justify-center p-6">

    <div class="max-w-2xl w-full text-center">
        <h1 class="text-4xl md:text-5xl font-black mb-4 text-transparent bg-clip-text bg-gradient-to-r from-pink-500 via-white to-cyan-400">
            TikTok Downloader
        </h1>
        <p class="text-slate-400 mb-8">Download TikTok videos in high quality without watermarks.</p>

        <div class="relative group mb-6">
            <input type="text" id="tiktokUrl" placeholder="Paste TikTok link here..." 
                class="w-full p-4 pr-32 rounded-2xl bg-slate-900 border-2 border-slate-800 outline-none focus:border-pink-500 transition-all text-white shadow-2xl">
            <button onclick="downloadVideo()" id="dlBtn"
                class="absolute right-2 top-2 bottom-2 px-6 bg-pink-600 hover:bg-pink-700 rounded-xl font-bold transition flex items-center gap-2">
                <i class="fas fa-download"></i> Fetch
            </button>
        </div>

        <div id="loader" class="hidden flex flex-col items-center py-10">
            <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-pink-500 border-opacity-50 mb-4"></div>
            <p class="text-slate-400">Processing video...</p>
        </div>

        <div id="resultCard" class="hidden bg-slate-900 border border-slate-800 p-6 rounded-3xl shadow-2xl mt-6 animate-fade-in">
            <div class="flex flex-col md:flex-row gap-6 items-center">
                <img id="videoThumb" src="" alt="Thumbnail" class="w-40 h-56 object-cover rounded-xl shadow-lg bg-slate-800">
                <div class="text-left flex-1">
                    <h3 id="videoTitle" class="text-xl font-bold mb-2 line-clamp-2">Video Found!</h3>
                    <p id="authorName" class="text-pink-400 text-sm mb-4 font-medium"></p>
                    
                    <div class="flex flex-wrap gap-3">
                        <a id="hdDownload" href="#" target="_blank" download="tiktok_video.mp4"
                            class="bg-green-600 hover:bg-green-700 px-6 py-3 rounded-xl font-bold flex items-center gap-2 transition flex-1 justify-center">
                            <i class="fas fa-video"></i> Download MP4
                        </a>
                        <button onclick="resetForm()" class="bg-slate-800 hover:bg-slate-700 px-6 py-3 rounded-xl font-bold transition">
                            Clear
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
